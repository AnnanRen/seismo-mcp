[project]
name = "gmt-mcp"
version = "0.1.0"
description = "MCP server exposing PyGMT (Generic Mapping Tools) map-making tools to LLM agents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "ran" }]
keywords = ["mcp", "gmt", "pygmt", "mapping", "cartography", "seismology", "llm", "ai"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Physics",
    "Topic :: Scientific/Engineering :: Visualization",
    "Intended Audience :: Science/Research",
]
dependencies = [
    "mcp>=1.27,<2",
    "pygmt>=0.11",
    "numpy>=1.24",
    "matplotlib>=3.6",
]

[project.scripts]
gmt-mcp = "gmt_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gmt_mcp"]
