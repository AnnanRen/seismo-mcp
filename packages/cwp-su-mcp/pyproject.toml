[project]
name = "cwp-su-mcp"
version = "0.1.0"
description = "MCP server exposing CWP/SU (Seismic Un*x) trace processing tools to LLM agents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "ran" }]
keywords = ["mcp", "seismic-unix", "cwp", "su", "seismology", "seismic", "llm", "ai"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Physics",
    "Intended Audience :: Science/Research",
]
dependencies = [
    "mcp>=1.27,<2",
]

# Console entry point so `uvx cwp-su-mcp` launches the server over stdio.
# Requires a working CWP-SU installation on PATH (CWPROOT set).
[project.scripts]
cwp-su-mcp = "cwp_su_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cwp_su_mcp"]
