[project]
name = "sac-mcp"
version = "0.1.0"
description = "MCP server exposing SAC (Seismic Analysis Code) waveform tools to LLM agents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "ran" }]
keywords = ["mcp", "sac", "seismic-analysis-code", "seismology", "seismic", "llm", "ai"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Physics",
    "Intended Audience :: Science/Research",
]
dependencies = [
    "mcp>=1.27,<2",
    "numpy>=1.24",
]

[project.scripts]
sac-mcp = "sac_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sac_mcp"]
