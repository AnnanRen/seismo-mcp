[project]
name = "obspy-mcp"
version = "0.1.0"
description = "MCP server exposing ObsPy waveform read / filter / plot / convert tools to LLM agents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "ran" }]
keywords = ["mcp", "obspy", "seismology", "seismic", "llm", "ai"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Physics",
    "Intended Audience :: Science/Research",
]
dependencies = [
    "mcp>=1.27,<2",
    "obspy>=1.4",
    "numpy>=1.24",
    "matplotlib>=3.6",
]

# A console entry point so `uvx obspy-mcp` launches the server over stdio.
[project.scripts]
obspy-mcp = "obspy_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/obspy_mcp"]
